name: Release

on:
    push:
        tags:
            - "v*"

jobs:
    build:
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install dependencies
              run: npm ci

            - name: Create .env
              run: echo "RIOT_API_KEY=${{ secrets.RIOT_API_KEY }}" > .env

            - name: Build & Publish
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npm run deploy
